<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>JackTracker Python</title>
  <style>
    :root { color-scheme: dark; font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    body { margin: 0; min-height: 100vh; background: radial-gradient(circle at top, rgba(29,185,84,.18), transparent 36rem), #090909; color: white; }
    main { width: min(960px, calc(100% - 32px)); margin: 0 auto; padding: 64px 0; }
    .hero { text-align: center; margin-bottom: 40px; }
    h1 { margin: 0; font-size: clamp(3rem, 10vw, 6rem); letter-spacing: -.08em; }
    .tagline { color: #b3b3b3; font-size: 1.1rem; }
    form { display: flex; gap: 12px; background: #121212; border: 1px solid #282828; border-radius: 999px; padding: 8px; box-shadow: 0 20px 80px rgba(0,0,0,.35); }
    input { flex: 1; min-width: 0; border: 0; outline: 0; background: transparent; color: white; font-size: 1rem; padding: 14px 18px; }
    button, .download-link { border: 0; border-radius: 999px; background: #1db954; color: #041006; font-weight: 800; padding: 12px 20px; cursor: pointer; text-decoration: none; }
    button:disabled { opacity: .5; cursor: not-allowed; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 24px; margin-top: 36px; }
    .panel { background: rgba(18,18,18,.78); border: 1px solid #282828; border-radius: 24px; padding: 20px; backdrop-filter: blur(16px); }
    .panel h2 { margin: 0 0 16px; font-size: 1rem; color: #dedede; }
    .track { display: grid; grid-template-columns: 56px 1fr; gap: 14px; align-items: center; padding: 12px; border-radius: 18px; background: #181818; margin-bottom: 10px; }
    .track img { width: 56px; height: 56px; border-radius: 12px; object-fit: cover; background: #282828; }
    .title { font-weight: 800; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }
    .artist, .status { color: #b3b3b3; font-size: .85rem; margin-top: 4px; }
    progress { width: 100%; accent-color: #1db954; }
    .error { color: #fb7185; margin-top: 16px; text-align: center; }
    .platforms { margin-top: 18px; color: #888; font-size: .9rem; }
  </style>
</head>
<body>
  <main>
    <section class="hero">
      <h1>JackTracker</h1>
      <p class="tagline">Python-powered downloader for Spotify, YouTube, Deezer, Audiomack, and other yt-dlp-supported music links.</p>
      <p class="platforms">Spotify uses spotDL first and automatically falls back to yt-dlp search when spotDL is rate-limited.</p>
    </section>

    <form id="url-form">
      <input id="url" type="url" placeholder="Paste a Spotify, YouTube, Deezer, Audiomack, or music URL..." required>
      <button id="submit" type="submit">Find & Download</button>
    </form>
    <div id="error" class="error"></div>

    <section class="grid">
      <div class="panel">
        <h2>Active Queue</h2>
        <div id="active"><p class="artist">Queue is empty</p></div>
      </div>
      <div class="panel">
        <h2>History</h2>
        <div id="history"><p class="artist">No recent downloads</p></div>
      </div>
    </section>
  </main>

  <script>
    const tracks = new Map();
    const form = document.getElementById('url-form');
    const input = document.getElementById('url');
    const submit = document.getElementById('submit');
    const errorBox = document.getElementById('error');
    const active = document.getElementById('active');
    const history = document.getElementById('history');

    const fallbackImage = '/static/logo.svg';

    function render() {
      const activeTracks = [...tracks.values()].filter(track => ['queued', 'downloading'].includes(track.status));
      const completedTracks = [...tracks.values()].filter(track => ['complete', 'error'].includes(track.status));
      active.innerHTML = activeTracks.length ? activeTracks.map(renderTrack).join('') : '<p class="artist">Queue is empty</p>';
      history.innerHTML = completedTracks.length ? completedTracks.map(renderTrack).join('') : '<p class="artist">No recent downloads</p>';
    }

    function escapeHtml(value) {
      return String(value || '').replace(/[&<>"']/g, char => ({'&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'}[char]));
    }

    function randomId() {
      // Fallback IDs are only used to correlate this page's local polling state.
      return crypto.randomUUID ? crypto.randomUUID() : `${Date.now()}-${Math.random().toString(16).slice(2)}`;
    }

    function renderTrack(track) {
      const progress = Math.round(track.progress || 0);
      const status = track.errorMessage || track.message || track.status;
      const action = track.downloadUrl ? `<a class="download-link" href="${track.downloadUrl}" download>MP3</a>` : '';
      return `<article class="track">
        <img src="${escapeHtml(track.albumArtUrl || fallbackImage)}" alt="" onerror="this.src='${fallbackImage}'">
        <div>
          <div class="title">${escapeHtml(track.trackName || 'Queued music link')}</div>
          <div class="artist">${escapeHtml(track.artistName || 'Unknown artist')}</div>
          <progress max="100" value="${progress}"></progress>
          <div class="status">${escapeHtml(status)} ${action}</div>
        </div>
      </article>`;
    }

    async function jsonFetch(url, options) {
      const response = await fetch(url, options);
      const data = await response.json().catch(() => ({}));
      if (!response.ok) throw new Error(data.error || 'Request failed');
      return data;
    }

    function poll(trackId) {
      const timer = setInterval(async () => {
        try {
          const status = await jsonFetch(`/api/download/${trackId}`);
          tracks.set(trackId, {...tracks.get(trackId), ...status});
          render();
          if (['complete', 'error'].includes(status.status)) clearInterval(timer);
        } catch (error) {
          clearInterval(timer);
          const track = tracks.get(trackId) || {id: trackId};
          tracks.set(trackId, {...track, status: 'error', errorMessage: error.message});
          render();
        }
      }, 1000);
    }

    form.addEventListener('submit', async (event) => {
      event.preventDefault();
      errorBox.textContent = '';
      submit.disabled = true;
      try {
        const metadata = await jsonFetch('/api/metadata', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({url: input.value})
        });

        for (const item of metadata) {
          const id = randomId();
          const track = {...item, id, status: 'queued', progress: 0};
          tracks.set(id, track);
          render();
          await jsonFetch('/api/download', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(track)
          });
          poll(id);
        }
        input.value = '';
      } catch (error) {
        errorBox.textContent = error.message;
      } finally {
        submit.disabled = false;
      }
    });

    render();
  </script>
</body>
</html>
